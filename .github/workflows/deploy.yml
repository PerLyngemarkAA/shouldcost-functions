name: Build and Push Container

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build container
        run: docker build -t ghcr.io/perlyngemarkaa/shouldcost-functions:latest .

      - name: Push container
        run: docker push ghcr.io/perlyngemarkaa/shouldcost-functions:latest
